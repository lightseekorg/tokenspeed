name: Publish AMD Nightly Docker Image

on:
  workflow_dispatch:

concurrency:
  group: publish-nightly-docker-amd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: lightseek/tokenspeed-amd

jobs:
  build-and-push:
    if: github.repository == 'lightseekorg/tokenspeed' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure these at repository or organization scope. The account must
      # have push access to both the lightseekorg and lightseek namespaces.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.amd
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:nightly-${{ github.sha }}
          no-cache: true
          provenance: false
