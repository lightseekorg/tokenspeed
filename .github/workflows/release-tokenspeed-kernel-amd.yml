name: Build and Release tokenspeed-kernel-amd

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to create or update. Defaults to tokenspeed-kernel-amd-v<version>."
        required: false
        type: string
      version_date:
        description: "Version date override for development builds, formatted as YYYYMMDD."
        required: false
        type: string
      prerelease:
        description: "Mark a release-branch GitHub release as a prerelease. Development releases are always prereleases."
        required: false
        default: false
        type: boolean
      publish_github:
        description: "Publish distributions to lightseekorg/whl and update its ROCm 7.2 simple index."
        required: false
        default: true
        type: boolean
      publish_pypi:
        description: "Publish a release-branch distribution to PyPI."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      version_date: ${{ steps.metadata.outputs.version_date }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: metadata
        env:
          PUBLISH_PYPI: ${{ inputs.publish_pypi }}
        run: |
          set -euo pipefail
          version_date="${{ inputs.version_date }}"
          if [ -z "$version_date" ]; then
            version_date="$(date -u +%Y%m%d)"
          fi

          version=$(cd tokenspeed-kernel-amd && \
            TOKENSPEED_KERNEL_VERSION_DATE="$version_date" \
            TOKENSPEED_KERNEL_GIT_SHA="$GITHUB_SHA" \
            TOKENSPEED_KERNEL_GIT_BRANCH="$GITHUB_REF_NAME" \
              python setup.py --version)

          if [ "$PUBLISH_PYPI" = "true" ] && [[ "$version" == *+* ]]; then
            echo "Version ${version} contains a local segment and cannot be published to PyPI; dispatch from a release/* branch." >&2
            exit 1
          fi

          tag_name="${{ inputs.tag_name }}"
          if [ -z "$tag_name" ]; then
            tag_name="tokenspeed-kernel-amd-v${version}"
          fi

          prerelease="${{ inputs.prerelease }}"
          if [[ "$GITHUB_REF_NAME" != release/* ]]; then
            prerelease=true
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_date=${version_date}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version}"
          echo "Release tag: ${tag_name}"

  build:
    name: Build distributions
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        env:
          TOKENSPEED_KERNEL_VERSION_DATE: ${{ needs.metadata.outputs.version_date }}
          TOKENSPEED_KERNEL_GIT_SHA: ${{ github.sha }}
          TOKENSPEED_KERNEL_GIT_BRANCH: ${{ github.ref_name }}
        run: |
          python -m pip install --upgrade build twine "setuptools<82" wheel
          python -m build tokenspeed-kernel-amd --sdist --wheel --no-isolation --outdir dist
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: tokenspeed-kernel-amd-dist
          path: dist/*

  release:
    name: Publish to wheelhouse
    if: ${{ inputs.publish_github }}
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tokenspeed-kernel-amd-*
          merge-multiple: true

      - name: Check out wheelhouse index
        uses: actions/checkout@v4
        with:
          repository: lightseekorg/whl
          ref: gh-pages
          token: ${{ secrets.LIGHTSEEK_BOT_TOKEN }}
          path: whl-index
          persist-credentials: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.LIGHTSEEK_BOT_TOKEN }}
          RELEASE_REPOSITORY: lightseekorg/whl
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
          VERSION: ${{ needs.metadata.outputs.version }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "LIGHTSEEK_BOT_TOKEN is required to publish to ${RELEASE_REPOSITORY}." >&2
            exit 1
          fi

          prerelease_args=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --repo "$RELEASE_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --repo "$RELEASE_REPOSITORY" \
              --title "tokenspeed-kernel-amd ${VERSION}" \
              --notes "tokenspeed-kernel-amd ${VERSION} built from lightseekorg/tokenspeed@${SOURCE_SHA}" \
              "${prerelease_args[@]}"
          fi

      - name: Update ROCm 7.2 simple index
        env:
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          simple_dir="whl-index/rocm7.2"
          package_index="${simple_dir}/tokenspeed-kernel-amd/index.html"
          root_index="${simple_dir}/index.html"
          mkdir -p "$(dirname "$package_index")"

          if ! grep -Fq 'href="tokenspeed-kernel-amd/"' "$root_index"; then
            printf '<a href="tokenspeed-kernel-amd/">tokenspeed-kernel-amd</a><br>\n' >> "$root_index"
          fi

          if [ ! -f "$package_index" ]; then
            printf '<!DOCTYPE html>\n<h1>tokenspeed-kernel-amd wheels for ROCm 7.2</h1>\n' > "$package_index"
          fi

          for artifact in dist/*; do
            filename="$(basename "$artifact")"
            sha256="$(sha256sum "$artifact" | awk '{print $1}')"
            tmp_index="${package_index}.tmp"
            grep -Fv ">$filename</a>" "$package_index" > "$tmp_index" || true
            printf '<a href="https://github.com/lightseekorg/whl/releases/download/%s/%s#sha256=%s">%s</a><br>\n' \
              "$TAG_NAME" "$filename" "$sha256" "$filename" >> "$tmp_index"
            mv "$tmp_index" "$package_index"
          done

          cd whl-index
          git config user.name "lightseek-bot"
          git config user.email "243258330+lightseek-bot@users.noreply.github.com"
          git add rocm7.2/index.html rocm7.2/tokenspeed-kernel-amd/index.html
          if ! git diff --cached --quiet; then
            git commit -s -m "Publish tokenspeed-kernel-amd ${TAG_NAME}"
            git pull --rebase origin gh-pages
            git push origin HEAD:gh-pages
          fi

  publish-pypi:
    name: Publish to PyPI
    if: ${{ inputs.publish_pypi }}
    needs: [metadata, build]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tokenspeed-kernel-amd-*
          merge-multiple: true

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
