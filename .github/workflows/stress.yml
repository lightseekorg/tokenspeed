name: Stress Test

# Heavyweight, on-demand stress test. Not part of per-commit CI (needs GPUs and
# tens of minutes). Trigger it from the Actions tab ("Run workflow"); it can
# stress any branch/tag/commit.
#
# The workflow is config-agnostic: all scenario specifics (model, serve flags,
# workload) live in a script under test/stress/scripts/. Add a script there to
# add a scenario; select it with the `scenario` input.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to stress test"
        required: false
        default: main
        type: string
      scenario:
        description: "Scenario script under test/stress/scripts/ (without .sh)"
        required: false
        default: kimi-k2.5-nvfp4-reality-mix
        type: string
      runner:
        description: "Self-hosted runner label"
        required: false
        default: b200-8gpu
        type: string
      duration_s:
        description: "Load duration in seconds (default 900 = 15 min)"
        required: false
        default: "900"
        type: string
      max_concurrency:
        description: "Peak in-flight requests (sawtooth)"
        required: false
        default: "40"
        type: string

concurrency:
  # Serialize runs per ref; don't kill an in-flight run.
  group: stress-${{ inputs.ref }}
  cancel-in-progress: false

env:
  PIP_BREAK_SYSTEM_PACKAGES: 1
  CUDA_VERSION: 13.0.1

jobs:
  stress:
    if: github.repository == 'lightseekorg/tokenspeed'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 90
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install dependencies
        run: bash test/ci_system/install_deps.sh

      - name: Run stress scenario
        env:
          OUT_DIR: ${{ github.workspace }}/stress-out
          DURATION_S: ${{ inputs.duration_s }}
          MAX_CONCURRENCY: ${{ inputs.max_concurrency }}
        run: |
          set -euo pipefail
          script="test/stress/scripts/${{ inputs.scenario }}.sh"
          if [ ! -f "$script" ]; then
            echo "No such scenario script: $script" >&2
            exit 1
          fi
          bash "$script"

      - name: Publish summary
        if: always()
        run: |
          summary="${{ github.workspace }}/stress-out/summary.txt"
          {
            echo "## Stress: ${{ inputs.scenario }} @ ${{ inputs.ref }}"
            echo
            if [ -f "$summary" ]; then
              echo '```'
              cat "$summary"
              echo '```'
            else
              echo "_No summary produced — the server likely never became ready._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-${{ inputs.scenario }}-${{ github.run_id }}
          path: stress-out/
