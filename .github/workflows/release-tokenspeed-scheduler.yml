name: Build and Release tokenspeed-scheduler

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to create or update. Defaults to tokenspeed-scheduler-v<version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean
      flat_kvcache:
        description: "Build with TOKENSPEED_FLAT_KVCACHE enabled."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build-wheel:
    name: Build wheels (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            build-selector: "cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64"
          - arch: aarch64
            runner: ubuntu-24.04-arm
            build-selector: "cp310-manylinux_aarch64 cp311-manylinux_aarch64 cp312-manylinux_aarch64 cp313-manylinux_aarch64"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1
        env:
          CIBW_BEFORE_ALL: dnf install -y openssl-devel
          CIBW_BUILD: ${{ matrix.build-selector }}
          CIBW_CONFIG_SETTINGS: "cmake.define.TOKENSPEED_FLAT_KVCACHE=${{ inputs.flat_kvcache && 'ON' || 'OFF' }}"
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
        with:
          package-dir: tokenspeed-scheduler
          output-dir: dist

      - name: Set up Python for wheel checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check wheels
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: tokenspeed-scheduler-wheels-${{ matrix.arch }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build twine
          cd tokenspeed-scheduler
          python -m build --sdist --outdir ../dist
          python -m twine check ../dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: tokenspeed-scheduler-sdist
          path: dist/*.tar.gz

  release:
    name: Create wheelhouse release
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: metadata
        run: |
          VERSION=$(python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("tokenspeed-scheduler/pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )
          TAG_NAME="${{ inputs.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="tokenspeed-scheduler-v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"
          echo "Release tag: ${TAG_NAME}"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tokenspeed-scheduler-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.LIGHTSEEK_BOT_TOKEN }}
          RELEASE_REPOSITORY: lightseekorg/whl
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          VERSION: ${{ steps.metadata.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          prerelease_args=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --repo "$RELEASE_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --repo "$RELEASE_REPOSITORY" \
              --title "tokenspeed-scheduler ${VERSION}" \
              --notes "tokenspeed-scheduler ${VERSION}" \
              "${prerelease_args[@]}"
          fi

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tokenspeed-scheduler-*
          merge-multiple: true

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
