api_version: ci.tokenspeed.io/v1
name: perf-minimax-m3-mxfp8-exact-longctx
type: perf
timeout_minutes: 180
triggers:
  - manual
runner:
  labels:
    - b200-4gpu
install:
  - bash test/ci_system/install_deps.sh
  - >-
    python3 test/ci_system/runtime_env_preflight.py
    --output .ci-artifacts/minimax-m3-exact-longctx/runtime_environment.json
server:
  command: >-
    tokenspeed serve MiniMaxAI/MiniMax-M3-MXFP8
    --revision c5454eb03678d8710e54a4e0fc681b9f3b4a3dba
    --served-model-name minimax-m3
    --trust-remote-code
    --language-model-only
    --tensor-parallel-size 4
    --base-gpu-id 0
    --gpu-id-step 1
    --max-model-len 1048576
    --max-total-tokens 1048576
    --max-num-seqs 1
    --chunked-prefill-size 8192
    --block-size 128
    --kv-cache-dtype fp8_e4m3
    --kv-cache-quant-method none
    --attention-backend mha
    --moe-backend triton
    --sampling-backend greedy
    --seed 20260715
    --enforce-eager
    --disable-kvstore
    --health-check-interval-secs 1800
    --host 127.0.0.1
    --port 8000
    --control-port 8001
  ready:
    url: http://127.0.0.1:8000/readiness
    timeout: 3600
    interval: 10
  forbidden_log_patterns:
    - Prefill graph capture failed
    - "Scheduler hit an exception:"
    - Buffer overflow when allocating memory
    - CUDA out of memory
    - OutOfMemoryError
    - Retract failed
    - "NCCL.*(?:abort|unhandled)"
perf:
  command: >-
    python3 test/ci_system/minimax_m3_exact_longctx.py
    --model minimax-m3
    --base-url http://127.0.0.1:8000
    --control-url http://127.0.0.1:8001
    --server-log .ci-artifacts/server.log
    --output-dir .ci-artifacts/minimax-m3-exact-longctx
    --gpu-ids 0,1,2,3
    --request-timeout-seconds 3600
    --memory-limit-mib 140000
report:
  github_step_summary: true
