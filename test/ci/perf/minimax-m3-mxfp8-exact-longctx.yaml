api_version: ci.tokenspeed.io/v1
name: perf-minimax-m3-mxfp8-exact-longctx
type: perf
triggers:
  - manual
runner:
  labels:
    - b200-4gpu
install:
  - bash test/ci_system/install_deps.sh
server:
  command: >-
    tokenspeed serve MiniMaxAI/MiniMax-M3-MXFP8
    --revision c5454eb03678d8710e54a4e0fc681b9f3b4a3dba
    --served-model-name minimax-m3
    --trust-remote-code
    --language-model-only
    --tensor-parallel-size 4
    --base-gpu-id 0
    --gpu-id-step 1
    --max-model-len 1048576
    --max-total-tokens 1048576
    --max-num-seqs 1
    --chunked-prefill-size 8192
    --block-size 128
    --kv-cache-dtype fp8_e4m3
    --kv-cache-quant-method none
    --attention-backend mha
    --moe-backend triton
    --sampling-backend greedy
    --seed 20260715
    --enforce-eager
    --disable-kvstore
    --health-check-interval-secs 1800
    --host 127.0.0.1
    --port 8000
  ready:
    url: http://127.0.0.1:8000/readiness
    timeout: 3600
    interval: 10
perf:
  command: >-
    rm -f /tmp/tokenspeed-minimax-m3-exact-longctx-memory.csv;
    nvidia-smi -i 0,1,2,3
    --query-gpu=index,memory.used
    --format=csv,noheader,nounits
    -l 1
    -f /tmp/tokenspeed-minimax-m3-exact-longctx-memory.csv &
    memory_monitor_pid=$!;
    trap 'kill "$memory_monitor_pid" 2>/dev/null || true' EXIT;
    set +e;
    python3 -c 'import time; import requests;
    started = time.perf_counter();
    response = requests.post(
    "http://127.0.0.1:8000/generate",
    json={"model":"minimax-m3","input_ids":[1] * 1048575,
    "sampling_params":{"temperature":0,"max_new_tokens":1}},
    timeout=3600);
    elapsed = time.perf_counter() - started;
    print("status=", response.status_code, "elapsed_s=", elapsed);
    print(response.text[:2000]);
    response.raise_for_status();
    body = response.json();
    assert isinstance(body, list) and len(body) == 1, body;
    output_ids = body[0].get("output_ids");
    assert output_ids == [123], output_ids;
    meta = body[0].get("meta_info", {});
    assert meta.get("prompt_tokens") == 1048575, meta;
    assert meta.get("completion_tokens") == 1, meta;
    health = requests.get("http://127.0.0.1:8000/readiness", timeout=30);
    print("post_request_readiness=", health.status_code);
    health.raise_for_status()';
    request_status=$?;
    kill "$memory_monitor_pid" 2>/dev/null || true;
    wait "$memory_monitor_pid" 2>/dev/null || true;
    trap - EXIT;
    python3 -c 'import json;
    from pathlib import Path;
    pairs = [(int(index.strip()), int(value.strip()))
    for line in Path("/tmp/tokenspeed-minimax-m3-exact-longctx-memory.csv").read_text().splitlines()
    if "," in line for index, value in [line.split(",", 1)]];
    assert pairs, "no GPU memory samples";
    peaks = {index: max(value for sample_index, value in pairs
    if sample_index == index) for index in sorted({index for index, _ in pairs})};
    print("Peak GPU memory (MiB): " + json.dumps(peaks, sort_keys=True))';
    memory_status=$?;
    if [ "$request_status" -ne 0 ]; then exit "$request_status"; fi;
    exit "$memory_status"
report:
  github_step_summary: true
