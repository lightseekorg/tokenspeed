api_version: ci.tokenspeed.io/v1
name: perf-minimax-m3-bf16-cache-random
type: perf
timeout_minutes: 120
triggers:
  - manual
runner:
  labels:
    - b200-4gpu
install:
  - bash test/ci_system/install_deps.sh
preflight:
  - >-
    python3 test/ci_system/runtime_env_preflight.py
    --output .ci-artifacts/minimax-m3-bf16-random/runtime_environment.json
server:
  command: >-
    tokenspeed serve MiniMaxAI/MiniMax-M3-MXFP8
    --revision c5454eb03678d8710e54a4e0fc681b9f3b4a3dba
    --served-model-name minimax-m3
    --trust-remote-code
    --language-model-only
    --tensor-parallel-size 4
    --base-gpu-id 0
    --gpu-id-step 1
    --max-model-len 65536
    --max-total-tokens 262144
    --max-num-seqs 16
    --chunked-prefill-size 8192
    --block-size 128
    --kv-cache-dtype auto
    --kv-cache-quant-method none
    --attention-backend mha
    --moe-backend triton
    --sampling-backend greedy
    --seed 20260715
    --no-enable-prefix-caching
    --disable-kvstore
    --host 127.0.0.1
    --port 8000
    --control-port 8001
  ready:
    url: http://127.0.0.1:8000/readiness
    timeout: 1800
    interval: 10
  shutdown:
    target: root
    signal: SIGTERM
    timeout_seconds: 120
    expected_exit_code: 0
    ports: [8000, 8001]
    gpu_indices: [0, 1, 2, 3]
    max_memory_mib: 16
    output: .ci-artifacts/minimax-m3-bf16-random/shutdown_validation.json
  forbidden_log_patterns:
    - 'Prefill graph capture failed'
    - 'Scheduler hit an exception:'
    - 'Buffer overflow when allocating memory'
    - 'CUDA out of memory'
    - 'OutOfMemoryError'
    - 'Retract failed'
    - 'NCCL.*(?:abort|unhandled)'
    - 'CancelledError'
    - 'Task was destroyed'
    - 'Traceback \(most recent call last\)'
    - 'Exception ignored in'
    - 'unhandled exception during asyncio.run\(\) shutdown'
    - 'resource_tracker:.*leaked'
perf:
  install:
    - python3 -m uv venv --seed --clear /tmp/evalscope-minimax-m3 && python3 -m uv pip install --python /tmp/evalscope-minimax-m3/bin/python 'evalscope[perf]==1.8.0'
    - >-
      /tmp/evalscope-minimax-m3/bin/python -c
      'import shutil;
      from pathlib import Path;
      from huggingface_hub import snapshot_download;
      target = Path("/tmp/minimax-m3-tokenizer");
      target.unlink() if target.is_symlink() or target.is_file()
      else shutil.rmtree(target) if target.exists() else None;
      snapshot = snapshot_download(
      repo_id="MiniMaxAI/MiniMax-M3-MXFP8",
      revision="c5454eb03678d8710e54a4e0fc681b9f3b4a3dba",
      allow_patterns=["*.json","*.jinja","*.txt","*.py"]);
      target.symlink_to(snapshot, target_is_directory=True)'
  command: >-
    artifact_dir=.ci-artifacts/minimax-m3-bf16-random;
    sweep_dir="$artifact_dir/sweep";
    memory_csv="$artifact_dir/gpu-memory.csv";
    rm -rf "$sweep_dir";
    rm -f "$memory_csv" "$artifact_dir/validation.json";
    mkdir -p "$sweep_dir";
    nvidia-smi -i 0,1,2,3
    --query-gpu=index,memory.used
    --format=csv,noheader,nounits
    -l 1
    -f "$memory_csv" &
    memory_monitor_pid=$!;
    trap 'kill "$memory_monitor_pid" 2>/dev/null || true' EXIT;
    set +e;
    (
    /tmp/evalscope-minimax-m3/bin/evalscope perf
    --model minimax-m3
    --url http://127.0.0.1:8000/v1/chat/completions
    --api openai
    --dataset random
    --tokenizer-path /tmp/minimax-m3-tokenizer
    --min-prompt-length 1024
    --max-prompt-length 1024
    --prefix-length 0
    --min-tokens 256
    --max-tokens 256
    --parallel 1 4 16
    --number 4 16 64
    --warmup-num 4
    --rate -1
    --seed 1
    --dataset-offset 0
    --temperature 0
    --stream
    --outputs-dir "$sweep_dir/input_1k"
    --no-timestamp
    --extra-args '{"ignore_eos":true}' &&
    /tmp/evalscope-minimax-m3/bin/evalscope perf
    --model minimax-m3
    --url http://127.0.0.1:8000/v1/chat/completions
    --api openai
    --dataset random
    --tokenizer-path /tmp/minimax-m3-tokenizer
    --min-prompt-length 8192
    --max-prompt-length 8192
    --prefix-length 0
    --min-tokens 256
    --max-tokens 256
    --parallel 1 4 16
    --number 4 16 64
    --warmup-num 4
    --rate -1
    --seed 1
    --dataset-offset 100000
    --temperature 0
    --stream
    --outputs-dir "$sweep_dir/input_8k"
    --no-timestamp
    --extra-args '{"ignore_eos":true}' &&
    /tmp/evalscope-minimax-m3/bin/evalscope perf
    --model minimax-m3
    --url http://127.0.0.1:8000/v1/chat/completions
    --api openai
    --dataset random
    --tokenizer-path /tmp/minimax-m3-tokenizer
    --min-prompt-length 32768
    --max-prompt-length 32768
    --prefix-length 0
    --min-tokens 256
    --max-tokens 256
    --parallel 1 4
    --number 4 16
    --warmup-num 4
    --rate -1
    --seed 1
    --dataset-offset 200000
    --temperature 0
    --stream
    --outputs-dir "$sweep_dir/input_32k"
    --no-timestamp
    --extra-args '{"ignore_eos":true}'
    );
    benchmark_status=$?;
    python3 test/random_benchmark/tokenspeed/collect_outputs.py
    "$sweep_dir"
    --num-gpus 4
    --expect-cell input_1k:1:4
    --expect-cell input_1k:4:16
    --expect-cell input_1k:16:64
    --expect-cell input_8k:1:4
    --expect-cell input_8k:4:16
    --expect-cell input_8k:16:64
    --expect-cell input_32k:1:4
    --expect-cell input_32k:4:16
    --validation-json "$artifact_dir/validation.json";
    validation_status=$?;
    kill "$memory_monitor_pid" 2>/dev/null || true;
    wait "$memory_monitor_pid" 2>/dev/null || true;
    trap - EXIT;
    python3 -c 'import json;
    import sys;
    from pathlib import Path;
    pairs = [(int(index.strip()), int(value.strip()))
    for line in Path(sys.argv[1]).read_text().splitlines()
    if "," in line for index, value in [line.split(",", 1)]];
    assert pairs, "no GPU memory samples";
    peaks = {index: max(value for sample_index, value in pairs
    if sample_index == index) for index in sorted({index for index, _ in pairs})};
    assert set(peaks) == {0, 1, 2, 3}, f"missing GPU memory samples: {peaks}";
    print("Peak GPU memory (MiB): " + json.dumps(peaks, sort_keys=True))'
    "$memory_csv";
    memory_status=$?;
    if [ "$benchmark_status" -ne 0 ]; then exit "$benchmark_status"; fi;
    if [ "$validation_status" -ne 0 ]; then exit "$validation_status"; fi;
    exit "$memory_status"
report:
  github_step_summary: true
perf_threshold: 0.9
# Values are [Latency (tps/user), Throughput (tps/gpu)].
perf_reference:
  input_1k:
    1: [11.55, 2.87]
    4: [11.68, 11.42]
    16: [10.64, 39.71]
  input_8k:
    1: [11.56, 2.76]
    4: [11.17, 9.88]
    16: [8.33, 25.58]
  input_32k:
    1: [11.55, 2.43]
    4: [9.29, 6.68]
