api_version: ci.tokenspeed.io/v1
name: perf-minimax-m3-mxfp8-encoder-graph-ab
type: perf
timeout_minutes: 240
isolated_python: true
triggers:
  - manual
runner:
  labels:
    - b200-4gpu
install:
  - bash test/ci_system/install_deps.sh
  - >-
    python3 test/ci_system/minimax_m3_smg_package_preflight.py
    --pyproject python/pyproject.toml
    --install-published
    --pip-install-report .ci-artifacts/minimax-m3-encoder-graph-ab/smg-pip-install.json
    --output .ci-artifacts/minimax-m3-encoder-graph-ab/smg-packages.json
  - >-
    python3 test/ci_system/fetch_minimax_m3_mm_fixtures.py
    --output-dir .ci-artifacts/minimax-m3-encoder-graph-ab/fixtures
preflight:
  - >-
    python3 test/ci_system/runtime_env_preflight.py
    --output .ci-artifacts/minimax-m3-encoder-graph-ab/runtime-environment.json
perf:
  command: >-
    python3 test/ci_system/minimax_m3_encoder_graph_ab_ci.py
    --work-dir .
    --output-dir .ci-artifacts/minimax-m3-encoder-graph-ab
    --dog .ci-artifacts/minimax-m3-encoder-graph-ab/fixtures/dog.jpg
    --reference test/ci/reference/minimax_m3_dog_visual_reference.json
    --runtime-environment .ci-artifacts/minimax-m3-encoder-graph-ab/runtime-environment.json
    --smg-packages .ci-artifacts/minimax-m3-encoder-graph-ab/smg-packages.json
    --pip-install-report .ci-artifacts/minimax-m3-encoder-graph-ab/smg-pip-install.json
    --server-sha "$(git rev-parse HEAD)"
    --request-timeout-seconds 600
    --bootstrap-samples 10000
    --bootstrap-seed 20260715
report:
  github_step_summary: true
