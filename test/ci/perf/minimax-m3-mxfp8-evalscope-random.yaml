api_version: ci.tokenspeed.io/v1
name: perf-minimax-m3-mxfp8-random
type: perf
triggers:
  - manual
runner:
  labels:
    - b200-4gpu
install:
  - bash test/ci_system/install_deps.sh
server:
  command: >-
    tokenspeed serve MiniMaxAI/MiniMax-M3-MXFP8
    --revision c5454eb03678d8710e54a4e0fc681b9f3b4a3dba
    --served-model-name minimax-m3
    --trust-remote-code
    --language-model-only
    --tensor-parallel-size 4
    --base-gpu-id 0
    --gpu-id-step 1
    --max-model-len 65536
    --max-total-tokens 262144
    --max-num-seqs 16
    --chunked-prefill-size 8192
    --block-size 128
    --kv-cache-dtype fp8_e4m3
    --kv-cache-quant-method none
    --attention-backend mha
    --moe-backend triton
    --sampling-backend greedy
    --no-enable-prefix-caching
    --disable-kvstore
    --host 127.0.0.1
    --port 8000
  ready:
    url: http://127.0.0.1:8000/readiness
    timeout: 1800
    interval: 10
perf:
  install:
    - python3 -m uv venv --seed --clear /tmp/evalscope-minimax-m3 && python3 -m uv pip install --python /tmp/evalscope-minimax-m3/bin/python 'evalscope[perf]==1.8.0'
    - >-
      /tmp/evalscope-minimax-m3/bin/python -c
      'import shutil;
      from pathlib import Path;
      from huggingface_hub import snapshot_download;
      target = Path("/tmp/minimax-m3-tokenizer");
      target.unlink() if target.is_symlink() or target.is_file()
      else shutil.rmtree(target) if target.exists() else None;
      snapshot = snapshot_download(
      repo_id="MiniMaxAI/MiniMax-M3-MXFP8",
      revision="c5454eb03678d8710e54a4e0fc681b9f3b4a3dba",
      allow_patterns=["*.json","*.jinja","*.txt","*.py"]);
      target.symlink_to(snapshot, target_is_directory=True)'
  # Add perf_reference only after the pinned sweep has a reviewed baseline.
  command: >-
    rm -rf /tmp/tokenspeed-minimax-m3-random;
    rm -f /tmp/tokenspeed-minimax-m3-fp8-memory.csv;
    nvidia-smi -i 0,1,2,3
    --query-gpu=index,memory.used
    --format=csv,noheader,nounits
    -l 1
    -f /tmp/tokenspeed-minimax-m3-fp8-memory.csv &
    memory_monitor_pid=$!;
    trap 'kill "$memory_monitor_pid" 2>/dev/null || true' EXIT;
    set +e;
    (
    /tmp/evalscope-minimax-m3/bin/evalscope perf
    --model minimax-m3
    --url http://127.0.0.1:8000/v1/chat/completions
    --api openai
    --dataset random
    --tokenizer-path /tmp/minimax-m3-tokenizer
    --min-prompt-length 1024
    --max-prompt-length 1024
    --prefix-length 0
    --min-tokens 256
    --max-tokens 256
    --parallel 1 4 16
    --number 4 16 64
    --warmup-num 4
    --rate -1
    --seed 1
    --dataset-offset 0
    --temperature 0
    --stream
    --outputs-dir /tmp/tokenspeed-minimax-m3-random/input_1k
    --no-timestamp
    --extra-args '{"ignore_eos":true}' &&
    /tmp/evalscope-minimax-m3/bin/evalscope perf
    --model minimax-m3
    --url http://127.0.0.1:8000/v1/chat/completions
    --api openai
    --dataset random
    --tokenizer-path /tmp/minimax-m3-tokenizer
    --min-prompt-length 8192
    --max-prompt-length 8192
    --prefix-length 0
    --min-tokens 256
    --max-tokens 256
    --parallel 1 4 16
    --number 4 16 64
    --warmup-num 4
    --rate -1
    --seed 1
    --dataset-offset 100000
    --temperature 0
    --stream
    --outputs-dir /tmp/tokenspeed-minimax-m3-random/input_8k
    --no-timestamp
    --extra-args '{"ignore_eos":true}' &&
    /tmp/evalscope-minimax-m3/bin/evalscope perf
    --model minimax-m3
    --url http://127.0.0.1:8000/v1/chat/completions
    --api openai
    --dataset random
    --tokenizer-path /tmp/minimax-m3-tokenizer
    --min-prompt-length 32768
    --max-prompt-length 32768
    --prefix-length 0
    --min-tokens 256
    --max-tokens 256
    --parallel 1 4
    --number 4 16
    --warmup-num 4
    --rate -1
    --seed 1
    --dataset-offset 200000
    --temperature 0
    --stream
    --outputs-dir /tmp/tokenspeed-minimax-m3-random/input_32k
    --no-timestamp
    --extra-args '{"ignore_eos":true}' &&
    python3 test/random_benchmark/tokenspeed/collect_outputs.py
    /tmp/tokenspeed-minimax-m3-random
    --num-gpus 4
    );
    perf_status=$?;
    kill "$memory_monitor_pid" 2>/dev/null || true;
    wait "$memory_monitor_pid" 2>/dev/null || true;
    trap - EXIT;
    python3 -c 'import json;
    from pathlib import Path;
    pairs = [(int(index.strip()), int(value.strip()))
    for line in Path("/tmp/tokenspeed-minimax-m3-fp8-memory.csv").read_text().splitlines()
    if "," in line for index, value in [line.split(",", 1)]];
    assert pairs, "no GPU memory samples";
    peaks = {index: max(value for sample_index, value in pairs
    if sample_index == index) for index in sorted({index for index, _ in pairs})};
    print("Peak GPU memory (MiB): " + json.dumps(peaks, sort_keys=True))';
    memory_status=$?;
    if [ "$perf_status" -ne 0 ]; then exit "$perf_status"; fi;
    exit "$memory_status"
report:
  github_step_summary: true
