api_version: ci.tokenspeed.io/v1
name: perf-kimi-k2.5-nvfp4-agentic
type: perf
triggers:
  - per-commit
  - manual
runner:
  labels:
    - b200-4gpu-perf
env:
  CI: "true"
  # DEBUG (b200-4gpu-perf): host has 8 B200s but the job is allocated 4;
  # NCCL's NVL Switch auto-probe iterates `nvmlDeviceGetHandleByIndex`
  # over every physical index and fails (`Unknown Error`) on the four
  # GPUs we don't own, aborting `dist.barrier()` during cudagraph
  # capture. Disable the NVLS probe so NCCL only enumerates owned
  # devices. Drop with the rest of the debug block once the perf
  # runner image properly restricts NVML visibility.
  NCCL_NVLS_ENABLE: "0"
install:
  # DEBUG (b200-4gpu-perf): the perf-runner image is missing some of the
  # baseline deps the standard b200-4gpu image ships in its Dockerfile
  # (NVIDIA CUDA dev packages, mooncake transfer engine, flashinfer JIT
  # cache wheel), so ts serve fails with undefined-symbol at startup.
  # Install them inline here mirroring the runner Dockerfile until the
  # perf-runner image is rebuilt. Revert this block once the image lands.
  - |
    set -eux
    ARCH=$(uname -m)
    case "$ARCH" in
      x86_64)  CUDA_REPO_ARCH=x86_64;  WHEEL_ARCH=x86_64 ;;
      aarch64) CUDA_REPO_ARCH=sbsa;    WHEEL_ARCH=aarch64 ;;
      *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
    esac
    sudo apt-get update -y -q
    sudo apt-get install -y --no-install-recommends gnupg curl ca-certificates
    # The b200-4gpu-perf image already has the NVIDIA CUDA repo configured
    # (keyring at /etc/apt/keyrings/nvidia.gpg). Only add our own list when
    # no existing list references developer.download.nvidia.com/compute/cuda;
    # otherwise apt fails with "Conflicting values set for option Signed-By".
    if ! grep -rqsF 'developer.download.nvidia.com/compute/cuda' /etc/apt/sources.list /etc/apt/sources.list.d/; then
      if [ ! -f /usr/share/keyrings/cuda-archive-keyring.gpg ]; then
        curl -fsSL "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/${CUDA_REPO_ARCH}/3bf863cc.pub" \
          | sudo gpg --dearmor -o /usr/share/keyrings/cuda-archive-keyring.gpg
      fi
      echo "deb [signed-by=/usr/share/keyrings/cuda-archive-keyring.gpg] https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/${CUDA_REPO_ARCH}/ /" \
        | sudo tee /etc/apt/sources.list.d/cuda.list > /dev/null
      sudo apt-get update -y -q
    fi
    # Jammy main only ships python3.10. The standard b200-4gpu pool uses
    # python3.12 (matches `tokenspeed-trtllm-kernel`'s cp312 wheel, which
    # is the one actually built against torch==2.11.0); the cp310 wheel
    # for the same version was built against an older torch and fails at
    # import with `torch::Library::_def(... vector<at::Tag>const&, ...) &`
    # undefined-symbol. Pull python3.12 from the deadsnakes PPA and make
    # it the default `python3` here so install_deps.sh + downstream pip
    # land everything under python3.12 / cp312.
    if ! command -v python3.12 >/dev/null; then
      sudo apt-get install -y --no-install-recommends software-properties-common
      sudo add-apt-repository -y ppa:deadsnakes/ppa
      sudo apt-get update -y -q
      # `distutils` is gone from the Python 3.12 stdlib (PEP 632),
      # so deadsnakes doesn't ship `python3.12-distutils`.
      sudo apt-get install -y --no-install-recommends \
        python3.12 python3.12-dev python3.12-venv
    fi
    # Bootstrap pip directly under 3.12 (deadsnakes' python3.12 doesn't
    # bundle ensurepip).
    curl -fsSL https://bootstrap.pypa.io/get-pip.py \
      | sudo python3.12 - --break-system-packages
    # Make `python3` resolve to 3.12 (PATH-priority swap; leaves the
    # system /usr/bin/python3 = 3.10 in place so anything else that
    # hard-codes the absolute path keeps working).
    sudo ln -sf /usr/bin/python3.12 /usr/local/bin/python3
    sudo ln -sf /usr/bin/python3.12 /usr/local/bin/python
    hash -r
    python3 --version
    # pyyaml was previously installed for python3.10 by the
    # `Install pipeline dependency` step; pipeline.py re-imports yaml
    # under the new python3.12, so reinstall it there.
    python3 -m pip install --break-system-packages --no-cache-dir pyyaml
    # The b200-4gpu-perf image has apt-installed `python3-psutil`
    # under /usr/lib/python3/dist-packages/psutil/ with a cp310-ABI
    # `_psutil_linux.so`. python3.12's sys.path still includes that
    # unversioned dist-packages dir (Debian patch), and tokenspeed's
    # runtime imports psutil at startup — so the broken .so trips
    # `cannot import name '_psutil_linux'` on first import. Drop the
    # apt copy and force-install psutil under python3.12 so the cp312
    # wheel lands in /usr/local/lib/python3.12/dist-packages/ ahead of
    # the broken one on sys.path.
    sudo rm -rf /usr/lib/python3/dist-packages/psutil /usr/lib/python3/dist-packages/psutil-*.dist-info /usr/lib/python3/dist-packages/psutil-*.egg-info
    python3 -m pip install --break-system-packages --no-cache-dir --force-reinstall psutil
    sudo apt-get install -y --no-install-recommends \
      libgomp1 \
      libnuma1 libibverbs1 rdma-core infiniband-diags ibverbs-providers \
      cuda-nvcc-13-0 libcublas-dev-13-0 cuda-nvrtc-dev-13-0 libcurand-dev-13-0
    # Drop any python3.10 leftovers that pip3 left at /home/ubuntu/.local
    # (including the broken cp310 trtllm_kernel .so). With python3 now
    # pointing at 3.12 those paths are unreachable for the engine, but
    # we want a clean tree before install_deps.sh runs.
    for p in \
      /home/ubuntu/.local/lib/python3.10/site-packages/trtllm_kernel \
      /home/ubuntu/.local/lib/python3.10/site-packages/tokenspeed_trtllm_kernel* \
      /usr/local/lib/python3.10/dist-packages/trtllm_kernel \
      /usr/local/lib/python3.10/dist-packages/tokenspeed_trtllm_kernel*; do
      sudo rm -rf $p 2>/dev/null || true
    done
    python3 -m pip install --break-system-packages --no-cache-dir \
      mooncake-transfer-engine-cuda13 \
      nvidia-cusparselt-cu13 \
      torch==2.11.0 \
      "https://github.com/flashinfer-ai/flashinfer/releases/download/v0.6.11/flashinfer_jit_cache-0.6.11+cu130-cp39-abi3-manylinux_2_28_${WHEEL_ARCH}.whl"
  - bash test/ci_system/install_deps.sh
server:
  command: >-
    ts serve
    --model nvidia/Kimi-K2.5-NVFP4
    --attn-tp-size 4
    --moe-tp-size 4
    --max-model-len 80000
    --max-num-seqs 16
    --gpu-memory-utilization 0.95
    --disable-cuda-graph-padding
    --trust-remote-code
    --attention-backend tokenspeed_mla
    --moe-backend flashinfer_trtllm
    --quantization nvfp4
    --kv-cache-dtype fp8
    --speculative-algorithm EAGLE3
    --speculative-draft-model-path lightseekorg/kimi-k2.5-eagle3-mla
    --speculative-num-steps 3
    --drafter-attention-backend tokenspeed_mla
    --enable-cache-report
    --weight-loader-prefetch-checkpoints
    --host 127.0.0.1
    --port 8000
  ready:
    url: http://127.0.0.1:8000/readiness
    timeout: 1800
    interval: 10
perf:
  install:
    - python3 -m uv venv --seed --clear /tmp/evalscope-perf && python3 -m uv pip install --python /tmp/evalscope-perf/bin/python 'evalscope[perf]'
    - >-
      test -f /tmp/agentic_dataset.json ||
      curl -fL
      https://huggingface.co/datasets/lightseekorg/agentic-dataset/resolve/main/agentic_dataset.json
      -o /tmp/agentic_dataset.json
  command: >-
    REPO_ROOT=$PWD &&
    OUTPUTS_DIR=/tmp/tokenspeed-agentic-perf &&
    WARMUP_DIR=/tmp/tokenspeed-agentic-warmup &&
    trap 'rm -rf "$OUTPUTS_DIR" "$WARMUP_DIR"' EXIT &&
    rm -rf "$OUTPUTS_DIR" "$WARMUP_DIR" &&
    cd /tmp &&
    /tmp/evalscope-perf/bin/evalscope perf
    --model nvidia/Kimi-K2.5-NVFP4
    --url http://localhost:8000/v1/chat/completions
    --api openai
    --dataset swe_smith
    --dataset-path agentic_dataset.json
    --max-tokens 500
    --multi-turn
    --number 2
    --parallel 2
    --dataset-offset 68
    --outputs-dir "$WARMUP_DIR"
    --extra-args '{"ignore_eos": true}' &&
    set +e &&
    /tmp/evalscope-perf/bin/evalscope perf
    --model nvidia/Kimi-K2.5-NVFP4
    --url http://localhost:8000/v1/chat/completions
    --api openai
    --dataset swe_smith
    --dataset-path agentic_dataset.json
    --max-tokens 500
    --multi-turn
    --number 4 8 8 16 32
    --parallel 1 2 4 8 16
    --outputs-dir "$OUTPUTS_DIR"
    --extra-args '{"ignore_eos": true}'
    --no-timestamp;
    PERF_STATUS=$?;
    if [ -d "$OUTPUTS_DIR/Kimi-K2.5-NVFP4" ]; then
    mv "$OUTPUTS_DIR/Kimi-K2.5-NVFP4" "$OUTPUTS_DIR/Kimi-K2.5-NVFP4_attn_tp4";
    fi;
    python3 "$REPO_ROOT/test/agentic_benchmark/tokenspeed/collect_outputs.py" "$OUTPUTS_DIR";
    PARSE_STATUS=$?;
    if [ "$PERF_STATUS" -ne 0 ]; then exit "$PERF_STATUS"; fi;
    exit "$PARSE_STATUS"
report:
  github_step_summary: true
perf_threshold: 0.9
# Values are [Latency (tps/user), Throughput (tps/gpu)]; gate fails any conc whose actual falls below ref * perf_threshold.
perf_reference:
  1:  [367.65, 8742.12]
  2:  [284.90, 13280.12]
  4:  [182.48, 17276.27]
  8:  [112.49, 20944.40]
  16: [67.61,  25181.19]
