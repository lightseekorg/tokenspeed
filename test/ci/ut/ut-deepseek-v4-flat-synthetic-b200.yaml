{
  "api_version": "ci.tokenspeed.io/v1",
  "name": "ut-deepseek-v4-flat-synthetic-b200",
  "type": "ut",
  "triggers": ["nightly", "manual"],
  "runner": {
    "labels": ["b200-1gpu"]
  },
  "env": {
    "CI": "true"
  },
  "install": [
    "bash test/ci_system/install_deps.sh",
    "bash test/ci_system/install_scheduler_variants.sh"
