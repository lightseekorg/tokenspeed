api_version: ci.tokenspeed.io/v1
name: ut-tokenspeed-kernel
type: ut
triggers:
  - per-commit
  - manual
# Shares the b300 box with eval-qwen3.5 / eval-kimi-k2.5 / perf-kimi-k2.5
# (all b300-4gpu). Drop this one to `low` so the 4gpu jobs claim the box
# first.
priority: low
runner:
  labels:
    - h100-1gpu
    - b200-1gpu
    - gb200-1gpu
    - b300-1gpu
    - linux-mi355-1gpu-lightseek
env:
  CI: "true"
install:
  - bash test/ci_system/install_deps.sh
ut:
  commands:
    - python3 -m pytest tokenspeed-kernel/test/test_numerics.py -v
    - python3 -m pytest tokenspeed-kernel/test/thirdparty/test_trtllm_comm.py -v
    - python3 -m pytest tokenspeed-kernel/test/thirdparty/test_cuda.py -v
    - python3 -m pytest tokenspeed-kernel/test/ -v --ignore=tokenspeed-kernel/test/test_numerics.py --ignore=tokenspeed-kernel/test/thirdparty/test_trtllm_comm.py --ignore=tokenspeed-kernel/test/thirdparty/test_cuda.py
report:
  github_step_summary: true
